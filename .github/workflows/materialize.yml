name: Materialize candidate campaign

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Decode staged archive
        shell: bash
        run: |
          set -euo pipefail
          cat bundle/part-* > /tmp/axial-campaign.b64
          base64 --decode /tmp/axial-campaign.b64 > /tmp/axial-campaign.tar.xz
      - name: Verify compressed archive
        shell: bash
        run: xz --test /tmp/axial-campaign.tar.xz
      - name: Extract campaign source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xJf /tmp/axial-campaign.tar.xz -C .
          test -f index.html
          test -f scripts/render_campaign.py
          test -f scripts/verify_campaign.py
      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check playwright pypdf
      - name: Fetch official Axial logo
        run: |
          mkdir -p assets/brand
          curl --fail --location --retry 3 --silent --show-error https://axialsearch.com/images/axial-logo.svg --output assets/brand/axial-logo.svg
      - name: Render campaign documents
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: python scripts/render_campaign.py --chrome "$CHROME_PATH" --no-screenshots
      - name: Verify complete campaign
        run: python scripts/verify_campaign.py
      - name: Commit complete candidate campaign
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete Axial candidate campaign"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
