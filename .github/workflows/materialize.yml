name: Materialize candidate campaign

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Decode staged archive
        shell: bash
        run: |
          set -euo pipefail
          cat bundle/part-* > /tmp/axial-campaign.b64
          base64 --decode /tmp/axial-campaign.b64 > /tmp/axial-campaign.tar.xz
      - name: Verify compressed archive
        shell: bash
        run: xz --test /tmp/axial-campaign.tar.xz
      - name: Extract campaign source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xJf /tmp/axial-campaign.tar.xz -C .
      - name: Verify required artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f resume.html
          test -f cover-letter.html
          test -f docs/Russell-Dudek-Axial-Fractional-CAIO-Resume.pdf
          test -f docs/Russell-Dudek-Axial-Fractional-CAIO-Cover-Letter.pdf
          test -f .github/workflows/publish.yml
      - name: Commit complete candidate campaign
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete Axial candidate campaign"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
