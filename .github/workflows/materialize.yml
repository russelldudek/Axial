name: Materialize candidate campaign

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Decode and verify staged archive
        shell: bash
        run: |
          set -euo pipefail
          cat bundle/part-* > /tmp/axial-campaign.b64
          base64 --decode /tmp/axial-campaign.b64 > /tmp/axial-campaign.tar.xz
          xz --test /tmp/axial-campaign.tar.xz
      - name: Extract campaign source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xJf /tmp/axial-campaign.tar.xz -C .
      - name: Standardize deterministic print renderer
        shell: bash
        run: |
          sed -i '1{/fonts.googleapis.com/d;}' styles.css
          cat > scripts/render_campaign.py <<'PY'
          from pathlib import Path
          from weasyprint import HTML

          ROOT = Path(__file__).resolve().parents[1]
          DOCS = {
              'resume.html': 'Russell-Dudek-Axial-Fractional-CAIO-Resume.pdf',
              'cover-letter.html': 'Russell-Dudek-Axial-Fractional-CAIO-Cover-Letter.pdf',
              'interview-brief.html': 'Russell-Dudek-Axial-Interview-Thesis-Brief.pdf',
              '120-day-plan.html': 'Russell-Dudek-Axial-120-Day-Entry-Plan.pdf',
              'mandate-charter.html': 'Russell-Dudek-Fractional-AI-Mandate-Charter.pdf',
              'fit-analysis.html': 'Russell-Dudek-Axial-Fractional-CAIO-Fit-Analysis.pdf',
          }

          def main() -> int:
              docs = ROOT / 'docs'
              docs.mkdir(exist_ok=True)
              for source, target in DOCS.items():
                  HTML(filename=str(ROOT / source), base_url=str(ROOT)).write_pdf(str(docs / target))
              return 0

          if __name__ == '__main__':
              raise SystemExit(main())
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deterministic document dependencies
        run: python -m pip install --disable-pip-version-check weasyprint pypdf
      - name: Fetch official Axial logo
        run: |
          mkdir -p assets/brand
          curl --fail --location --retry 3 --silent --show-error https://axialsearch.com/images/axial-logo.svg --output assets/brand/axial-logo.svg
      - name: Render campaign documents
        run: python scripts/render_campaign.py
      - name: Verify complete campaign
        run: python scripts/verify_campaign.py
      - name: Prepare final Pages workflow
        shell: bash
        run: |
          rm -rf .github
          mkdir -p .github/workflows
          touch .nojekyll
          cat > .github/workflows/publish.yml <<'YAML'
          name: Validate and publish candidate vision

          on:
            push:
              branches: [main]
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: pages
            cancel-in-progress: false

          jobs:
            deploy:
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: '3.12'
                - name: Install verification dependencies
                  run: python -m pip install --disable-pip-version-check pypdf
                - name: Verify campaign
                  run: python scripts/verify_campaign.py
                - uses: actions/configure-pages@v5
                  with:
                    enablement: true
                - uses: actions/upload-pages-artifact@v3
                  with:
                    path: .
                - id: deployment
                  uses: actions/deploy-pages@v4
          YAML
      - name: Create detached verified commit
        id: detached
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path
          from urllib.request import Request, urlopen

          root = Path('.')
          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GITHUB_TOKEN']

          def api(path, payload):
              req = Request(
                  f'https://api.github.com/repos/{repo}{path}',
                  data=json.dumps(payload).encode('utf-8'),
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'Authorization': f'Bearer {token}',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'User-Agent': 'Axial-campaign-materializer',
                  },
                  method='POST',
              )
              with urlopen(req, timeout=120) as response:
                  return json.load(response)

          entries = []
          for file in sorted(root.rglob('*')):
              if not file.is_file() or '.git' in file.parts:
                  continue
              data = file.read_bytes()
              blob = api('/git/blobs', {
                  'content': base64.b64encode(data).decode('ascii'),
                  'encoding': 'base64',
              })
              entries.append({
                  'path': file.as_posix(),
                  'mode': '100755' if os.access(file, os.X_OK) else '100644',
                  'type': 'blob',
                  'sha': blob['sha'],
              })

          tree = api('/git/trees', {'tree': entries})
          commit = api('/git/commits', {
              'message': 'Publish complete Axial candidate campaign',
              'tree': tree['sha'],
              'parents': [os.environ['GITHUB_SHA']],
          })
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f"sha={commit['sha']}\n")
          print(f"Detached verified commit: {commit['sha']}")
          PY
      - name: Report verified commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body "MATERIALIZED_COMMIT_SHA=${{ steps.detached.outputs.sha }}"
