name: Bootstrap GitHub Pages deployment

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: pages-bootstrap
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install verification dependencies
        run: python -m pip install --disable-pip-version-check pypdf
      - name: Verify campaign
        run: python scripts/verify_campaign.py
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Report deployment URL
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          if [ -n "$PAGE_URL" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body "PAGES_DEPLOYMENT_URL=$PAGE_URL"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "PAGES_DEPLOYMENT_FAILED_AFTER_VERIFICATION"
          fi
