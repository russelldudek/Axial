name: Capture official brand assets

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch official assets and public style evidence
        run: |
          mkdir -p assets/brand research
          curl --fail --location --retry 3 --silent --show-error \
            https://axialsearch.com/images/axial-logo.svg \
            --output assets/brand/axial-logo.svg
          python - <<'PY'
          import json, re, urllib.parse, urllib.request
          from html.parser import HTMLParser
          from collections import Counter

          page_url = 'https://axialsearch.com/'
          req = urllib.request.Request(page_url, headers={'User-Agent':'Mozilla/5.0'})
          html = urllib.request.urlopen(req, timeout=30).read().decode('utf-8', 'replace')

          class Links(HTMLParser):
              def __init__(self):
                  super().__init__(); self.styles=[]
              def handle_starttag(self, tag, attrs):
                  if tag != 'link': return
                  data = dict(attrs)
                  rel = (data.get('rel') or '').lower()
                  href = data.get('href')
                  if href and 'stylesheet' in rel:
                      self.styles.append(urllib.parse.urljoin(page_url, href))

          parser = Links(); parser.feed(html)
          css_parts=[]
          for url in parser.styles:
              try:
                  req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
                  css_parts.append(urllib.request.urlopen(req, timeout=30).read().decode('utf-8','replace'))
              except Exception:
                  pass
          css='\n'.join(css_parts)
          colors=Counter(c.lower() for c in re.findall(r'#[0-9a-fA-F]{3,8}\b', css))
          families=[]
          for value in re.findall(r'font-family\s*:\s*([^;}]+)', css, flags=re.I):
              value=' '.join(value.strip().split())
              if value not in families:
                  families.append(value)
          probe={
              'official_page': page_url,
              'official_logo': 'https://axialsearch.com/images/axial-logo.svg',
              'stylesheets': parser.styles,
              'frequent_css_colors': colors.most_common(30),
              'declared_font_families': families[:30]
          }
          with open('research/brand-probe.json','w',encoding='utf-8') as f:
              json.dump(probe,f,indent=2)
          PY
      - name: Commit captured evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/brand/axial-logo.svg research/brand-probe.json
          if ! git diff --cached --quiet; then
            git commit -m "Capture official Axial brand evidence"
            git push
          fi
